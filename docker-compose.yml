services:
  bot:
    build: .
    container_name: support-bot
    env_file: .env
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgres://yozatune:secret@postgres:5432/yozatune?sslmode=disable
    networks:
      - shared
    restart: unless-stopped

networks:
  shared:
    external: true
    name: shared
